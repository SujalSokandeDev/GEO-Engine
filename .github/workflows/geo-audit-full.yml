name: GEO Audit Full

on:
  workflow_dispatch:
    inputs:
      site:
        description: "Site slug to audit, or all"
        required: false
        default: all
        type: choice
        options:
          - all
          - businessabc
          - citiesabc
          - intelligenthq
          - fashionabc
          - freedomx
          - hedgethink
          - tradersdna
      time_budget_minutes:
        description: "Soft time budget per run"
        required: false
        default: "330"
      max_urls:
        description: "Optional URL cap for controlled runs; 0 means all"
        required: false
        default: "0"
      concurrency:
        description: "Pages to audit concurrently; 0 uses per-site defaults"
        required: false
        default: "0"
      checkpoint_batch_size:
        description: "Checkpoint commit frequency in completed pages"
        required: false
        default: "30"
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: write
  actions: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.sites.outputs.sites }}
    steps:
      - id: sites
        shell: bash
        run: |
          requested="${{ github.event.inputs.site || 'all' }}"
          if [ "$requested" = "all" ]; then
            echo 'sites=[{"name":"businessabc","sitemap":"https://businessabc.net/sitemap.xml","concurrency":2},{"name":"citiesabc","sitemap":"https://citiesabc.com/sitemap.xml","concurrency":3},{"name":"intelligenthq","sitemap":"https://www.intelligenthq.com/sitemap_index.xml","concurrency":1},{"name":"fashionabc","sitemap":"https://www.fashionabc.org/sitemap_index.xml","concurrency":3},{"name":"freedomx","sitemap":"https://freedomx.com/sitemap_index.xml","concurrency":3},{"name":"hedgethink","sitemap":"http://www.hedgethink.com/sitemap_index.xml","concurrency":3},{"name":"tradersdna","sitemap":"http://www.tradersdna.com/sitemap_index.xml","concurrency":3}]' >> "$GITHUB_OUTPUT"
          else
            case "$requested" in
              businessabc) sitemap="https://businessabc.net/sitemap.xml"; concurrency=2 ;;
              citiesabc) sitemap="https://citiesabc.com/sitemap.xml"; concurrency=3 ;;
              intelligenthq) sitemap="https://www.intelligenthq.com/sitemap_index.xml"; concurrency=1 ;;
              fashionabc) sitemap="https://www.fashionabc.org/sitemap_index.xml"; concurrency=3 ;;
              freedomx) sitemap="https://freedomx.com/sitemap_index.xml"; concurrency=3 ;;
              hedgethink) sitemap="http://www.hedgethink.com/sitemap_index.xml"; concurrency=3 ;;
              tradersdna) sitemap="http://www.tradersdna.com/sitemap_index.xml"; concurrency=3 ;;
              *) echo "Unknown site: $requested" >&2; exit 1 ;;
            esac
            echo "sites=[{\"name\":\"$requested\",\"sitemap\":\"$sitemap\",\"concurrency\":$concurrency}]" >> "$GITHUB_OUTPUT"
          fi

  full-audit:
    needs: plan
    name: Full ${{ matrix.site.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: geo-full-${{ matrix.site.name }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.plan.outputs.sites) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip uninstall -y sentence-transformers || true

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run checkpointed GEO audit
        run: |
          max_urls="${{ github.event.inputs.max_urls || '0' }}"
          max_arg=()
          if [ "$max_urls" != "0" ]; then
            max_arg=(--max-urls "$max_urls")
          fi
          concurrency="${{ github.event.inputs.concurrency || '0' }}"
          if [ "$concurrency" = "0" ]; then
            concurrency="${{ matrix.site.concurrency }}"
          fi
          python scripts/geo_audit.py "${{ matrix.site.sitemap }}" \
            --site-name "${{ matrix.site.name }}" \
            --concurrency "$concurrency" \
            --time-budget-minutes "${{ github.event.inputs.time_budget_minutes || '330' }}" \
            --checkpoint-file "progress/${{ matrix.site.name }}.json" \
            --checkpoint-batch-size "${{ github.event.inputs.checkpoint_batch_size || '30' }}" \
            --commit-checkpoints \
            --out "reports/${{ matrix.site.name }}" \
            "${max_arg[@]}"

      - name: Commit checkpoint and results
        shell: bash
        run: |
          git add progress reports results
          if git diff --cached --quiet; then
            echo "No checkpoint or result changes to commit."
          else
            git commit -m "Update GEO audit state for ${{ matrix.site.name }} [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git pull --rebase && git push; then
                exit 0
              fi
              sleep $((attempt * 5))
            done
            exit 1
          fi

      - name: Check checkpoint status
        id: checkpoint
        shell: bash
        run: |
          status="$(python -c "import json; print(json.load(open('progress/${{ matrix.site.name }}.json'))['status'])")"
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Dispatch next resume run
        if: steps.checkpoint.outputs.status == 'in_progress'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/geo-audit-full.yml/dispatches \
            -f ref="${{ github.ref_name }}" \
            -f inputs[site]="${{ matrix.site.name }}" \
            -f inputs[time_budget_minutes]="${{ github.event.inputs.time_budget_minutes || '330' }}" \
            -f inputs[max_urls]="${{ github.event.inputs.max_urls || '0' }}" \
            -f inputs[concurrency]="${{ github.event.inputs.concurrency || '0' }}" \
            -f inputs[checkpoint_batch_size]="${{ github.event.inputs.checkpoint_batch_size || '30' }}"

      - name: Upload latest run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geo-full-${{ matrix.site.name }}
          path: |
            progress/${{ matrix.site.name }}.json
            reports/${{ matrix.site.name }}/
            results/${{ matrix.site.name }}/
