name: GEO Audit Full

on:
  workflow_dispatch:
    inputs:
      site:
        description: "Site slug to audit, or all"
        required: false
        default: all
        type: choice
        options:
          - all
          - businessabc
          - citiesabc
          - intelligenthq
          - fashionabc
          - freedomx
          - hedgethink
          - tradersdna
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: write
  actions: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.sites.outputs.sites }}
    steps:
      - id: sites
        shell: bash
        run: |
          requested="${{ github.event.inputs.site || 'all' }}"
          if [ "$requested" = "all" ]; then
            echo 'sites=[{"name":"businessabc","sitemap":"https://businessabc.net/sitemap.xml"},{"name":"citiesabc","sitemap":"https://citiesabc.com/sitemap.xml"},{"name":"intelligenthq","sitemap":"https://www.intelligenthq.com/sitemap_index.xml"},{"name":"fashionabc","sitemap":"https://www.fashionabc.org/sitemap_index.xml"},{"name":"freedomx","sitemap":"https://freedomx.com/sitemap_index.xml"},{"name":"hedgethink","sitemap":"http://www.hedgethink.com/sitemap_index.xml"},{"name":"tradersdna","sitemap":"http://www.tradersdna.com/sitemap_index.xml"}]' >> "$GITHUB_OUTPUT"
          else
            case "$requested" in
              businessabc) sitemap="https://businessabc.net/sitemap.xml" ;;
              citiesabc) sitemap="https://citiesabc.com/sitemap.xml" ;;
              intelligenthq) sitemap="https://www.intelligenthq.com/sitemap_index.xml" ;;
              fashionabc) sitemap="https://www.fashionabc.org/sitemap_index.xml" ;;
              freedomx) sitemap="https://freedomx.com/sitemap_index.xml" ;;
              hedgethink) sitemap="http://www.hedgethink.com/sitemap_index.xml" ;;
              tradersdna) sitemap="http://www.tradersdna.com/sitemap_index.xml" ;;
              *) echo "Unknown site: $requested" >&2; exit 1 ;;
            esac
            echo "sites=[{\"name\":\"$requested\",\"sitemap\":\"$sitemap\"}]" >> "$GITHUB_OUTPUT"
          fi

  full-audit:
    needs: plan
    name: Full ${{ matrix.site.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: geo-full-${{ matrix.site.name }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.plan.outputs.sites) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip uninstall -y sentence-transformers || true

      - name: Run checkpointed GEO audit
        run: |
          python scripts/geo_audit.py "${{ matrix.site.sitemap }}" \
            --site-name "${{ matrix.site.name }}" \
            --concurrency 3 \
            --time-budget-minutes 330 \
            --checkpoint-file "progress/${{ matrix.site.name }}.json" \
            --checkpoint-batch-size 20 \
            --out "reports/${{ matrix.site.name }}"

      - name: Commit checkpoint and results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add progress reports results
          if git diff --cached --quiet; then
            echo "No checkpoint or result changes to commit."
          else
            git commit -m "Update GEO audit state for ${{ matrix.site.name }} [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git pull --rebase && git push; then
                exit 0
              fi
              sleep $((attempt * 5))
            done
            exit 1
          fi

      - name: Check checkpoint status
        id: checkpoint
        shell: bash
        run: |
          status="$(python -c "import json; print(json.load(open('progress/${{ matrix.site.name }}.json'))['status'])")"
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Dispatch next resume run
        if: steps.checkpoint.outputs.status == 'in_progress'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/geo-audit-full.yml/dispatches \
            -f ref="${{ github.ref_name }}" \
            -f inputs[site]="${{ matrix.site.name }}"

      - name: Upload latest run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geo-full-${{ matrix.site.name }}
          path: |
            progress/${{ matrix.site.name }}.json
            reports/${{ matrix.site.name }}/
            results/${{ matrix.site.name }}/
