name: GEO Audit Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-audit:
    name: Test ${{ matrix.site.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        site:
          - name: businessabc
            sitemap: https://businessabc.net/sitemap.xml
          - name: citiesabc
            sitemap: https://citiesabc.com/sitemap.xml
          - name: intelligenthq
            sitemap: https://www.intelligenthq.com/sitemap_index.xml
          - name: fashionabc
            sitemap: https://www.fashionabc.org/sitemap_index.xml
          - name: freedomx
            sitemap: https://freedomx.com/sitemap_index.xml
          - name: hedgethink
            sitemap: http://www.hedgethink.com/sitemap_index.xml
          - name: tradersdna
            sitemap: http://www.tradersdna.com/sitemap_index.xml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip uninstall -y sentence-transformers || true

      - name: Run capped GEO audit
        run: |
          python scripts/geo_audit.py "${{ matrix.site.sitemap }}" \
            --site-name "${{ matrix.site.name }}" \
            --max-urls 30 \
            --concurrency 3 \
            --time-budget-minutes 25 \
            --checkpoint-file "reports/test/${{ matrix.site.name }}.checkpoint.json" \
            --out reports/test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: geo-test-${{ matrix.site.name }}
          path: reports/test/
