name: GEO Audit Full

on:
  workflow_dispatch:
    inputs:
      site:
        description: "Site slug to audit, or all"
        required: false
        default: all
        type: choice
        options:
          - all
          - businessabc
          - citiesabc
          - intelligenthq
          - fashionabc
          - freedomx
          - hedgethink
          - tradersdna
      force_restart:
        description: "Delete the existing checkpoint before running"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: write
  actions: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.sites.outputs.sites }}
    steps:
      - id: sites
        shell: bash
        run: |
          requested="${{ github.event.inputs.site || 'all' }}"
          if [ "$requested" = "all" ]; then
            echo 'sites=["businessabc","citiesabc","intelligenthq","fashionabc","freedomx","hedgethink","tradersdna"]' >> "$GITHUB_OUTPUT"
          else
            echo "sites=[\"$requested\"]" >> "$GITHUB_OUTPUT"
          fi

  full-audit:
    needs: plan
    name: Full ${{ matrix.site }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: geo-full-${{ matrix.site }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.plan.outputs.sites) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -c constraints.txt
          python -m pip uninstall -y sentence-transformers || true

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run checkpointed GEO audit
        run: |
          args=(resume --site "${{ matrix.site }}" --time-budget-minutes 330 --commit-checkpoints)
          if [ "${{ github.event.inputs.force_restart || 'false' }}" = "true" ]; then
            args+=(--force-restart)
          fi
          python geo_audit.py "${args[@]}"

      - name: Commit progress and reports
        id: commit
        shell: bash
        run: |
          git add progress reports
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update GEO audit checkpoint for ${{ matrix.site }}"
            for attempt in 1 2 3; do
              git pull --rebase && git push && break
              sleep $((attempt * 5))
            done
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload latest state
        uses: actions/upload-artifact@v4
        with:
          name: geo-full-${{ matrix.site }}
          path: |
            progress/${{ matrix.site }}.json
            reports/${{ matrix.site }}/

      - name: Check completion
        id: state
        shell: bash
        run: |
          if [ -f "reports/${{ matrix.site }}/state.json" ]; then
            complete="$(python -c "import json; print(str(json.load(open('reports/${{ matrix.site }}/state.json'))['complete']).lower())")"
          else
            complete="false"
          fi
          echo "complete=$complete" >> "$GITHUB_OUTPUT"

      - name: Dispatch next resume run
        if: steps.state.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/geo-audit-full.yml/dispatches \
            -f ref="${{ github.ref_name }}" \
            -f inputs[site]="${{ matrix.site }}" \
            -F inputs[force_restart]=false
